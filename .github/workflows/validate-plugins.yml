name: Validate Plugins

on:
  pull_request:
    paths:
      - '.claude-plugin/**'
      - 'plugins/**'
      - 'external_plugins/**'
      - 'scripts/marketplace-sources.json'
      - '.github/workflows/validate-plugins.yml'
  push:
    branches: [main]
    paths:
      - '.claude-plugin/**'
      - 'plugins/**'
      - 'external_plugins/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Anthropic's reusable validator action. Sha-pinned for supply-chain
      # safety. Bumps from the upstream action are visible in PR diffs.
      - uses: anthropics/claude-plugins-community/.github/actions/validate-plugins@f846a0bcb0e721b1f93d60e8b73e91dafc4a1e87
        with:
          marketplace-path: .claude-plugin/marketplace.json
          claude-cli-version: latest
